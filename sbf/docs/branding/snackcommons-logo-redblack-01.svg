<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 280" role="img" aria-labelledby="title desc">
  <title id="title">SnackCommons red black logo concept 01</title>
  <desc id="desc">Modern dark fridge icon with Czech red accents and bold wordmark.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cf112a" />
      <stop offset="100%" stop-color="#e8334a" />
    </linearGradient>
  </defs>

  <rect width="980" height="280" fill="#fafafa" />

  <g transform="translate(44 30)">
    <rect x="0" y="0" width="196" height="220" rx="32" fill="url(#bgGrad)" />
    <rect x="22" y="22" width="152" height="176" rx="20" fill="#27272a" />
    <line x1="22" y1="106" x2="174" y2="106" stroke="#3f3f46" stroke-width="4" />
    <rect x="136" y="62" width="10" height="24" rx="4" fill="#e4e4e7" />
    <rect x="136" y="126" width="10" height="24" rx="4" fill="#e4e4e7" />
    <circle cx="54" cy="64" r="8" fill="#e8334a" />
    <circle cx="84" cy="64" r="8" fill="#cf112a" />
    <circle cx="114" cy="64" r="8" fill="#f82843" />
    <path d="M50 150 C76 124, 120 124, 146 150" fill="none" stroke="url(#redGrad)" stroke-width="7" stroke-linecap="round" />
  </g>

  <g transform="translate(284 94)">
    <text x="0" y="58" font-family="'Manrope','Segoe UI',sans-serif" font-size="70" font-weight="800" fill="#09090b">SnackCommons</text>
    <rect x="2" y="74" width="462" height="8" rx="4" fill="url(#redGrad)" />
    <text x="2" y="114" font-family="'Manrope','Segoe UI',sans-serif" font-size="24" font-weight="600" fill="#52525b" letter-spacing="0.5">office sharing for friends, built in the open</text>
  </g>
</svg>
