# Shared environment for app and scheduler services.
# Secret values (APP_KEY, DB_PASSWORD, etc.) are intentionally absent here —
# they are read from Docker secrets via .env.production (file: identifier).
# Override any value by adding it to compose `environment:` or a .env file.
x-app-env: &app-env
  HOST: 0.0.0.0
  PORT: 3000
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: sbf
  DB_DATABASE: sbf
  SESSION_DRIVER: cookie
  TZ: ${TZ:-UTC}
  APP_URL: ${APP_URL:-http://localhost:3000}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  SMTP_HOST: ${SMTP_HOST:-localhost}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USERNAME: ${SMTP_USERNAME:-}
  SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-noreply@localhost.localdomain}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Lednice IT}
  SMTP_IGNORE_TLS: ${SMTP_IGNORE_TLS:-false}
  OIDC_ENABLED: ${OIDC_ENABLED:-false}
  OIDC_AUTO_REGISTER: ${OIDC_AUTO_REGISTER:-false}
  LOCAL_LOGIN_DISABLED: ${LOCAL_LOGIN_DISABLED:-false}
  OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
  OIDC_TENANT_ID: ${OIDC_TENANT_ID:-}
  OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
  FEEDBACK_URL: ${FEEDBACK_URL:-}
  SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
  ESL_AIMS_ENABLED: ${ESL_AIMS_ENABLED:-false}
  ESL_AIMS_BASE_URL: ${ESL_AIMS_BASE_URL:-}
  ESL_AIMS_STORE: ${ESL_AIMS_STORE:-}
  ESL_AIMS_CRON: ${ESL_AIMS_CRON:-}
  ESL_AIMS_VERIFY_TLS: ${ESL_AIMS_VERIFY_TLS:-true}
  ESL_JAMES_ENABLED: ${ESL_JAMES_ENABLED:-false}
  ESL_JAMES_BASE_URL: ${ESL_JAMES_BASE_URL:-}
  ESL_JAMES_STORE: ${ESL_JAMES_STORE:-}
  ESL_JAMES_CRON: ${ESL_JAMES_CRON:-}
  ESL_JAMES_VERIFY_TLS: ${ESL_JAMES_VERIFY_TLS:-true}

services:
  app:
    image: houbystudio/sbf:latest
    ports:
      - '3000:3000'
    environment:
      <<: *app-env
    secrets:
      - app_key
      - db_password
      # - oidc_client_secret  # uncomment when OIDC_ENABLED=true
      # - api_secret          # uncomment when API auth is needed
      # - smtp_password
      # - openai_api_key
      # - esl_james_api_key
    volumes:
      - app_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    image: houbystudio/sbf:latest
    container_name: scheduler
    command: node ace scheduler:run
    environment:
      <<: *app-env
      CRON_DAILY_REPORT: ${CRON_DAILY_REPORT:-}
      CRON_UNPAID_REMINDER: ${CRON_UNPAID_REMINDER:-}
      CRON_PENDING_APPROVAL: ${CRON_PENDING_APPROVAL:-}
      UNPAID_REMINDER_MIN_AGE_DAYS: ${UNPAID_REMINDER_MIN_AGE_DAYS:-}
    secrets:
      - app_key
      - db_password
      # - oidc_client_secret  # uncomment when OIDC_ENABLED=true
      # - api_secret          # uncomment when API auth is needed
      # - smtp_password
      # - openai_api_key
      # - esl_james_api_key
    volumes:
      - app_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: sbf
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: sbf
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sbf']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

secrets:
  app_key:
    file: ./secrets/app_key
  db_password:
    file: ./secrets/db_password
  # oidc_client_secret:
  #   file: ./secrets/oidc_client_secret
  # api_secret:
  #   file: ./secrets/api_secret
  # smtp_password:
  #   file: ./secrets/smtp_password
  # openai_api_key:
  #   file: ./secrets/openai_api_key
  # esl_james_api_key:
  #   file: ./secrets/esl_james_api_key

volumes:
  pgdata:
  app_uploads:
