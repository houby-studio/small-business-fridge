  <title id="title">SnackCommons logo concept 01</title>
  <desc id="desc">Rounded fridge icon with shared items and modern wordmark.</desc>
  <defs>
    <linearGradient id="gradA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17B26A" />
      <stop offset="100%" stop-color="#0EA5A8" />
    </linearGradient>
  </defs>
  <rect width="920" height="260" fill="#F8FAFC" />
  <g transform="translate(40 30)">
    <rect x="0" y="0" width="180" height="200" rx="34" fill="url(#gradA)" />
    <line x1="0" y1="96" x2="180" y2="96" stroke="#E6FFFA" stroke-width="6" />
    <circle cx="132" cy="58" r="8" fill="#E6FFFA" />
    <circle cx="132" cy="140" r="8" fill="#E6FFFA" />
    <rect x="28" y="38" width="74" height="20" rx="8" fill="#E6FFFA" opacity="0.9" />
