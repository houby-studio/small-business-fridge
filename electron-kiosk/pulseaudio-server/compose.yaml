# PulseAudio server for the SBF kiosk.
#
# The snap connects via TCP on localhost:4713.  The port is bound only to
# 127.0.0.1 so it is not reachable from the network.  The snap's existing
# `network` plug covers outbound TCP — no extra audio interface is required.

services:
  pulseaudio:
    image: houbystudio/sbf-pulseaudio-server:24.04
    container_name: pulseaudio
    restart: always
    devices:
      - /dev/snd
    volumes:
      # Socket directory — used by the internal healthcheck (pactl via unix socket).
      # The snap itself connects via TCP, so this is not required for audio playback.
      - /run/user/1000/pulse:/run/user/1000/pulse
    ports:
      # Bind to loopback only — never expose PulseAudio on the network.
      - '127.0.0.1:4713:4713'
    group_add:
      # Use the numeric GID of the host's audio group (getent group audio → 1005).
      # Do NOT use the name "audio" — Ubuntu container images define audio as GID 29
      # which does not match this host, so /dev/snd access would be silently denied.
      - "1005"
    environment:
      - XDG_RUNTIME_DIR=/run/user/1000
      # Options: analog, hdmi, auto, or exact sink name
      - PULSE_SINK=hdmi
      # Volume percentage (0-150)
      - PULSE_VOLUME=100
      # Whether to unmute on startup
      - PULSE_UNMUTE=true
      # Seconds to wait for PA to initialize before configuring sinks
      - PULSE_STARTUP_DELAY=2
      # ALSA card index used for mixer configuration (amixer -c N)
      - PULSE_ALSA_CARD=0
    healthcheck:
      # pactl runs as root inside the container; auth-anonymous=1 on the unix socket allows it.
      test:
        ['CMD-SHELL', 'PULSE_SERVER=unix:/run/user/1000/pulse/native pactl info >/dev/null 2>&1']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
