name: sbf-kiosk
version: '1.0.0'
summary: Small Business Fridge — kiosk client
description: |
  Kiosk client for the Small Business Fridge office inventory system.
  Configure the server URL after installation:
    snap set sbf-kiosk url=https://your-server.example.com

confinement: strict
compression: lzo
grade: stable
base: core24

apps:
  sbf-kiosk:
    command-chain: &_command-chain
      - bin/wayland-launch
    command: &_command usr/bin/wrapper
    plugs: &_plugs
      - alsa
      - opengl
      - wayland
      - browser-support
      - network
      - network-bind
    extensions: &_extensions
      - gnome
    environment: &_environment
      XDG_DATA_HOME: $SNAP_USER_DATA
      XDG_DATA_DIRS: $SNAP/usr/share
      GTK_USE_PORTAL: 0
      GDK_GL: gles
      ALSA_CONFIG_PATH: $SNAP/usr/share/alsa/alsa.conf
      ALSA_CONFIG_DIR: $SNAP/usr/share/alsa

  daemon:
    daemon: simple
    restart-delay: 2s
    restart-condition: always
    command-chain: *_command-chain
    command: *_command
    plugs: *_plugs
    environment: *_environment
    extensions: *_extensions

environment:
  XDG_CACHE_HOME:  $SNAP_USER_COMMON/.cache
  XDG_CONFIG_HOME: $SNAP_USER_DATA/.config
  XDG_CONFIG_DIRS: $SNAP/etc/xdg
  XDG_DATA_DIRS:   $SNAP/usr/local/share:$SNAP/usr/share
  XKB_CONFIG_ROOT: $SNAP/usr/share/X11/xkb
  ALSA_CONFIG_PATH: $SNAP/usr/share/alsa/alsa.conf
  ALSA_CONFIG_DIR: $SNAP/usr/share/alsa

layout:
  /usr/share/fonts:
    bind: $SNAP/usr/share/fonts
  /usr/share/icons:
    bind: $SNAP/usr/share/icons
  /etc/fonts:
    bind: $SNAP/etc/fonts
  # ALSA config must be accessible at its expected system path.
  # The snap stages alsa.conf via libasound2t64; this layout makes it visible.
  /usr/share/alsa:
    bind: $SNAP/usr/share/alsa

parts:
  sbf-kiosk:
    plugin: dump
    source: dist/linux-unpacked
    stage-packages:
      - libnspr4
      - libnss3
      - libasound2t64
      - libasound2-plugins
      # alsa-utils provides amixer for volume control.
      - alsa-utils

  wrapper:
    plugin: dump
    source: wrapper
    organize:
      wrapper.sh: usr/bin/wrapper

  gsettings+pixbuf+immodules:
    plugin: nil
    build-packages:
      - libgdk-pixbuf2.0-0
      - librsvg2-common
      - shared-mime-info
      - libgtk-3-0
    override-build: |
      craftctl default
      update-mime-database ${CRAFT_PART_INSTALL}/usr/share/mime
      mkdir -p ${CRAFT_PART_INSTALL}/usr/lib/${CRAFT_ARCH_TRIPLET_BUILD_FOR}/gtk-3.0/3.0.0/
      /usr/lib/${CRAFT_ARCH_TRIPLET_BUILD_FOR}/libgtk-3-0t64/gtk-query-immodules-3.0 \
        > ${CRAFT_PART_INSTALL}/usr/lib/${CRAFT_ARCH_TRIPLET_BUILD_FOR}/gtk-3.0/3.0.0/immodules.cache
    stage-packages:
      - librsvg2-common
      - gsettings-desktop-schemas
      - libglib2.0-bin
    override-prime: |
      craftctl default
      /usr/lib/${CRAFT_ARCH_TRIPLET_BUILD_FOR}/glib-2.0/glib-compile-schemas \
        "$CRAFT_PRIME/usr/share/glib-2.0/schemas"
      LOADERS_PATH=$(echo ${CRAFT_PRIME}/usr/lib/${CRAFT_ARCH_TRIPLET_BUILD_FOR}/gdk-pixbuf-2.0/*/loaders)
      QUERY_LOADERS=/usr/lib/${CRAFT_ARCH_TRIPLET_BUILD_ON}/gdk-pixbuf-2.0/gdk-pixbuf-query-loaders
      GDK_PIXBUF_MODULEDIR=${LOADERS_PATH} ${QUERY_LOADERS} > ${LOADERS_PATH}/../loaders.cache
      sed s!$CRAFT_PRIME!!g --in-place ${LOADERS_PATH}/../loaders.cache

  setup:
    plugin: dump
    source: wayland-launch
    override-build: |
      PLUGS="alsa opengl wayland browser-support network network-bind"
      sed --in-place "s/%PLUGS%/$PLUGS/g" $CRAFT_PART_BUILD/bin/wayland-launch
      sed --in-place "s/%PLUGS%/$PLUGS/g" $CRAFT_PART_BUILD/bin/setup.sh
      craftctl default
    stage-packages:
      - inotify-tools

platforms:
  amd64:
  arm64:
