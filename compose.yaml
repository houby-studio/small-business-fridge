# =============================================================================
# Small Business Fridge — Production Docker Compose
# =============================================================================
# 1. Copy this file and .env.example to your server.
# 2. Create a .env file next to this file (cp .env.example .env).
# 3. Fill in the required values marked with [REQUIRED] below.
# 4. Run: docker compose up -d
#
# Docker Compose automatically loads variables from a .env file in the same
# directory. All ${VAR} references below are resolved from that file (or from
# your shell environment if you prefer to export them).
# =============================================================================

# Shared environment block — applied to both app and scheduler containers.
x-app-env: &app-env
  # ---------------------------------------------------------------------------
  # Core — networking & identity
  # ---------------------------------------------------------------------------
  NODE_ENV: production
  HOST: ${HOST:-0.0.0.0} # bind to all interfaces inside the container (don't change)
  PORT: ${PORT:-3000} # listen port inside the container (don't change)

  LOG_LEVEL: ${LOG_LEVEL:-info} # trace | debug | info | warn | error | fatal
  TZ: ${TZ:-UTC} # e.g. Europe/Prague
  APP_NAME: ${APP_NAME:-Small Business Fridge}
  APP_URL: ${APP_URL:-http://localhost:3000} # [REQUIRED] public URL used in email links
  FEEDBACK_URL: ${FEEDBACK_URL:-} # optional link shown in the UI sidebar

  # ---------------------------------------------------------------------------
  # Security — [REQUIRED] generate once and keep secret
  # docker run houbystudio/sbf /usr/local/bin/node ace generate:key --show
  # ---------------------------------------------------------------------------
  APP_KEY: ${APP_KEY:?Missing APP_KEY value in .env file!} # no default — app refuses to start if missing

  # ---------------------------------------------------------------------------
  # Database — postgres service below uses the same DB_PASSWORD
  # ---------------------------------------------------------------------------
  DB_HOST: postgres # Docker service name — don't change
  DB_PORT: 5432
  DB_USER: ${DB_USER:-sbf}
  DB_DATABASE: ${DB_DATABASE:-sbf}
  DB_PASSWORD: ${DB_PASSWORD:?Missing DB_PASSWORD value in .env file!} # [REQUIRED] set a strong password
  DB_MIGRATE: ${DB_MIGRATE:-true} # run DB migrations on app container startup

  # ---------------------------------------------------------------------------
  # Mail (SMTP)
  # ---------------------------------------------------------------------------
  SMTP_HOST: ${SMTP_HOST:-localhost}
  SMTP_PORT: ${SMTP_PORT:-587} # 587 (STARTTLS) or 465 (SSL) or 25 (plain)
  SMTP_USERNAME: ${SMTP_USERNAME:-} # leave empty if no auth
  SMTP_PASSWORD: ${SMTP_PASSWORD:-} # leave empty if no auth
  SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-noreply@localhost.localdomain}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Small Business Fridge}
  SMTP_IGNORE_TLS: ${SMTP_IGNORE_TLS:-false} # true = plain SMTP, no TLS

  # ---------------------------------------------------------------------------
  # Session
  # ---------------------------------------------------------------------------
  SESSION_DRIVER: ${SESSION_DRIVER:-cookie}

  # ---------------------------------------------------------------------------
  # Authentication providers (optional)
  # ---------------------------------------------------------------------------
  AUTH_PROVIDERS: ${AUTH_PROVIDERS:-local} # comma list: local,microsoft,discord
  AUTH_AUTO_REGISTER_PROVIDERS: ${AUTH_AUTO_REGISTER_PROVIDERS:-} # e.g. microsoft,discord
  AUTH_REGISTRATION_MODE: ${AUTH_REGISTRATION_MODE:-open} # open | invite_only | domain_auto_approve | closed
  AUTH_REGISTRATION_ALLOWED_DOMAINS: ${AUTH_REGISTRATION_ALLOWED_DOMAINS:-}
  AUTH_EMAIL_VERIFICATION_REQUIRED: ${AUTH_EMAIL_VERIFICATION_REQUIRED:-false}
  EMAIL_VERIFICATION_TTL_MINUTES: ${EMAIL_VERIFICATION_TTL_MINUTES:-1440}
  AUTH_PROVIDER_MICROSOFT_CLIENT_ID: ${AUTH_PROVIDER_MICROSOFT_CLIENT_ID:-}
  AUTH_PROVIDER_MICROSOFT_CLIENT_SECRET: ${AUTH_PROVIDER_MICROSOFT_CLIENT_SECRET:-}
  AUTH_PROVIDER_MICROSOFT_TENANT_ID: ${AUTH_PROVIDER_MICROSOFT_TENANT_ID:-common}
  AUTH_PROVIDER_MICROSOFT_REDIRECT_URI: ${AUTH_PROVIDER_MICROSOFT_REDIRECT_URI:-}
  AUTH_PROVIDER_MICROSOFT_EMAIL_VERIFICATION_MODE: ${AUTH_PROVIDER_MICROSOFT_EMAIL_VERIFICATION_MODE:-always}
  AUTH_PROVIDER_DISCORD_CLIENT_ID: ${AUTH_PROVIDER_DISCORD_CLIENT_ID:-}
  AUTH_PROVIDER_DISCORD_CLIENT_SECRET: ${AUTH_PROVIDER_DISCORD_CLIENT_SECRET:-}
  AUTH_PROVIDER_DISCORD_REDIRECT_URI: ${AUTH_PROVIDER_DISCORD_REDIRECT_URI:-}
  AUTH_PROVIDER_DISCORD_SCOPES: ${AUTH_PROVIDER_DISCORD_SCOPES:-identify,email}
  AUTH_PROVIDER_DISCORD_EMAIL_VERIFICATION_MODE: ${AUTH_PROVIDER_DISCORD_EMAIL_VERIFICATION_MODE:-claim}

  # ---------------------------------------------------------------------------
  # API authentication (optional)
  # ---------------------------------------------------------------------------
  API_SECRET: ${API_SECRET:-} # bearer token for REST API access; leave empty to disable

  # ---------------------------------------------------------------------------
  # Swagger UI (optional)
  # ---------------------------------------------------------------------------
  SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false} # expose /docs endpoint

  # ---------------------------------------------------------------------------
  # OpenAI integration (optional)
  # ---------------------------------------------------------------------------
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  # ---------------------------------------------------------------------------
  # ESL — AIMS electronic shelf labels (optional)
  # ---------------------------------------------------------------------------
  ESL_AIMS_ENABLED: ${ESL_AIMS_ENABLED:-false}
  ESL_AIMS_BASE_URL: ${ESL_AIMS_BASE_URL:-}
  ESL_AIMS_STORE: ${ESL_AIMS_STORE:-}
  ESL_AIMS_CRON: ${ESL_AIMS_CRON:-}
  ESL_AIMS_VERIFY_TLS: ${ESL_AIMS_VERIFY_TLS:-true}

  # ---------------------------------------------------------------------------
  # ESL — JAMES electronic shelf labels (optional)
  # ---------------------------------------------------------------------------
  ESL_JAMES_ENABLED: ${ESL_JAMES_ENABLED:-false}
  ESL_JAMES_BASE_URL: ${ESL_JAMES_BASE_URL:-}
  ESL_JAMES_STORE: ${ESL_JAMES_STORE:-}
  ESL_JAMES_API_KEY: ${ESL_JAMES_API_KEY:-}
  ESL_JAMES_CRON: ${ESL_JAMES_CRON:-}
  ESL_JAMES_VERIFY_TLS: ${ESL_JAMES_VERIFY_TLS:-true}

services:
  app:
    image: houbystudio/sbf:${DOCKER_IMAGE_TAG:-latest}
    ports:
      - '${HOST_PORT:-3000}:3000'
    environment:
      <<: *app-env
    volumes:
      - app_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    image: houbystudio/sbf:${DOCKER_IMAGE_TAG:-latest}
    command: node ace scheduler:run
    environment:
      <<: *app-env
      # Cron expressions (optional — Mon–Fri defaults are built into the app)
      CRON_DAILY_REPORT: ${CRON_DAILY_REPORT:-}
      CRON_UNPAID_REMINDER: ${CRON_UNPAID_REMINDER:-}
      CRON_PENDING_APPROVAL: ${CRON_PENDING_APPROVAL:-}
      UNPAID_REMINDER_MIN_AGE_DAYS: ${UNPAID_REMINDER_MIN_AGE_DAYS:-}
    volumes:
      - app_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-sbf}
      POSTGRES_USER: ${DB_USER:-sbf}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-sbf}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  app_uploads:
