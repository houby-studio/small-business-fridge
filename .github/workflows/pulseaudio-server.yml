name: Build and push PulseAudio server Docker image
permissions:
  contents: read

on:
  push:
    branches: ['feat/*', 'master']
    paths:
      - 'electron-kiosk/pulseaudio-server/**'
  workflow_dispatch:
    inputs:
      ubuntu_version:
        description: Ubuntu base image version
        default: '24.04'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve Ubuntu version
        id: vars
        run: |
          UBUNTU_VERSION="${{ github.event.inputs.ubuntu_version || '24.04' }}"
          echo "ubuntu_version=${UBUNTU_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./electron-kiosk/pulseaudio-server
          file: ./electron-kiosk/pulseaudio-server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            UBUNTU_VERSION=${{ steps.vars.outputs.ubuntu_version }}
          tags: |
            houbystudio/sbf-pulseaudio-server:latest
            houbystudio/sbf-pulseaudio-server:${{ steps.vars.outputs.ubuntu_version }}
            houbystudio/sbf-pulseaudio-server:${{ github.sha }}
          cache-from: type=registry,ref=houbystudio/sbf-pulseaudio-server:buildcache
          cache-to: type=registry,ref=houbystudio/sbf-pulseaudio-server:buildcache,mode=max
